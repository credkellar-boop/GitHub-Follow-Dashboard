name: GitHub Follow Dashboard Sync

on:
  schedule:
    # Runs every 6 hours (Standard cron syntax)
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allows you to trigger it manually from the Actions tab

jobs:
  sync_audience:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Dashboard Sync
        env:
          GITHUB_USERNAME: ${{ secrets.GITHUB_USERNAME }}
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WA_TOKEN: ${{ secrets.WA_TOKEN }}
          WA_PHONE_ID: ${{ secrets.WA_PHONE_ID }}
          WA_RECIPIENT: ${{ secrets.WA_RECIPIENT }}
        run: python main.py

      - name: Commit and Push State Update
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/followers.json
          # Only commit if there are changes to the state file
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-update followers state" && git push)
💮
